name: CI

# Run on every push and pull request targeting the master branch
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # Lint all Markdown files using markdownlint-cli
  markdown-lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdownlint-cli
        run: npm install -g markdownlint-cli

      - name: Lint Markdown files
        run: markdownlint "**/*.md" --ignore node_modules

  # Check for broken links in all Markdown files
  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install markdown-link-check
        run: npm install -g markdown-link-check

      - name: Check links in Markdown files
        run: |
          find . -name "*.md" -not -path "./node_modules/*" | \
            xargs -I {} markdown-link-check {} --config .mlc-config.json
